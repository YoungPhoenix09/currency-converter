name: currency-converter
services:
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    expose:
      - "5432"
    environment:
      POSTGRES_PASSWORD: password
  db-admin:
    image: dpage/pgadmin4
    ports:
      - "8090:80"
    expose:
      - "8090"
    environment:
      PGADMIN_DEFAULT_EMAIL: test@user.com
      PGADMIN_DEFAULT_PASSWORD: password
